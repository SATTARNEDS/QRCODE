{% extends "base.html" %}
{% block title %}Dashboard – QRTrack{% endblock %}

{% block content %}
<div class="container py-5">

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h2 class="fw-700 mb-1">
        <i class="bi bi-grid-3x3-gap text-accent me-2"></i>Dashboard
      </h2>
      <p class="text-muted mb-0">QR Code ทั้งหมดของคุณ (อัปเดตแบบ real-time)</p>
    </div>
    <a href="/" class="btn btn-primary">
      <i class="bi bi-plus-lg me-1"></i>สร้าง QR Code ใหม่
    </a>
  </div>

  <div id="dashboard-content">
    <!-- Stats Summary will be loaded here -->
  </div>

  <!-- QR Code Grid -->
  <div id="qr-grid" class="row g-3">
    <!-- Cards will be loaded here -->
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
  let dashboardRefreshInterval;
  
  async function loadDashboard() {
    try {
      const res = await fetch("/api/dashboard-stats");
      const data = await res.json();
      
      if (!res.ok) return;
      
      // Build stats summary
      const statsHtml = `
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="stat-summary-card">
              <div class="stat-icon bg-primary-subtle text-primary">
                <i class="bi bi-qr-code-scan"></i>
              </div>
              <div>
                <div class="stat-num">${data.total_links}</div>
                <div class="stat-label">QR Code ทั้งหมด</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-summary-card">
              <div class="stat-icon bg-success-subtle text-success">
                <i class="bi bi-eye-fill"></i>
              </div>
              <div>
                <div class="stat-num">${data.total_scans}</div>
                <div class="stat-label">การสแกนทั้งหมด</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-summary-card">
              <div class="stat-icon bg-warning-subtle text-warning">
                <i class="bi bi-trophy-fill"></i>
              </div>
              <div>
                <div class="stat-num">${data.links.length > 0 ? Math.max(...data.links.map(l => l.scan_count)) : 0}</div>
                <div class="stat-label">สแกนสูงสุด</div>
              </div>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="stat-summary-card">
              <div class="stat-icon bg-info-subtle text-info">
                <i class="bi bi-calendar3"></i>
              </div>
              <div>
                <div class="stat-num">${data.links.length > 0 ? data.links[0].created_at.split(' ')[0] : '—'}</div>
                <div class="stat-label">สร้างล่าสุด</div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById("dashboard-content").innerHTML = statsHtml;
      
      // Build QR cards grid
      if (data.links.length === 0) {
        document.getElementById("qr-grid").innerHTML = `
          <div class="col-12">
            <div class="empty-state text-center py-5">
              <div class="empty-icon mb-3">
                <i class="bi bi-qr-code"></i>
              </div>
              <h5 class="fw-600 mb-2">ยังไม่มี QR Code</h5>
              <p class="text-muted mb-4">เริ่มต้นสร้าง QR Code แรกของคุณได้เลย</p>
              <a href="/" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>สร้าง QR Code
              </a>
            </div>
          </div>
        `;
      } else {
        let cardsHtml = '';
        data.links.forEach(link => {
          cardsHtml += `
            <div class="col-md-6 col-lg-4">
              <div class="card qr-card h-100">
                <div class="card-body p-4">
                  <div class="d-flex align-items-start gap-3 mb-3">
                    <div class="qr-thumb-wrapper">
                      <img
                        src="{{ url_for('qr_image', short_code='') }}${link.short_code}"
                        alt="QR"
                        class="qr-thumb"
                      />
                    </div>
                    <div class="flex-grow-1 min-w-0">
                      <h6 class="fw-600 mb-1 text-truncate-2" title="${link.title}">
                        ${link.title}
                      </h6>
                      <a href="${link.original_url}" target="_blank" rel="noopener noreferrer"
                         class="small text-muted text-truncate d-block link-hover"
                         title="${link.original_url}">
                        ${link.original_url.substring(0, 45)}${link.original_url.length > 45 ? '…' : ''}
                      </a>
                      <div class="mt-2">
                        <span class="badge scan-badge pulse">
                          <i class="bi bi-eye me-1"></i>${link.scan_count}สแกน
                        </span>
                      </div>
                    </div>
                  </div>
                  <div class="tracking-url-box-sm mb-3">
                    <small class="text-muted">
                      <i class="bi bi-link-45deg me-1"></i>
                      <code>/r/${link.short_code}</code>
                    </small>
                  </div>
                  <small class="text-muted d-block mb-3">
                    <i class="bi bi-clock me-1"></i>${link.created_at.substring(0, 16)}
                  </small>
                  <div class="d-flex gap-2">
                    <a href="/stats/${link.short_code}" class="btn btn-primary btn-sm flex-grow-1">
                      <i class="bi bi-bar-chart-line me-1"></i>สถิติ
                    </a>
                    <button class="btn btn-outline-secondary btn-sm"
                            onclick="copyUrl('{{ request.host_url }}r/${link.short_code}')"
                            title="คัดลอก URL">
                      <i class="bi bi-clipboard"></i>
                    </button>
                    <form action="/delete/${link.short_code}" method="POST" style="margin:0;"
                          onsubmit="return confirm('ลบ QR Code นี้? ข้อมูลสถิติจะหายไปทั้งหมด')">
                      <button type="submit" class="btn btn-outline-danger btn-sm" title="ลบ" style="width:100%;">
                        <i class="bi bi-trash3"></i>
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        document.getElementById("qr-grid").innerHTML = cardsHtml;
      }
    } catch (err) {
      console.error("Dashboard load error:", err);
    }
  }
  
  function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => showToast("คัดลอก URL สำเร็จ!"));
  }
  
  // Load dashboard initially
  loadDashboard();
  
  // Auto-refresh every 3 seconds
  dashboardRefreshInterval = setInterval(loadDashboard, 3000);
  
  // Clean up on page unload
  window.addEventListener('beforeunload', () => {
    clearInterval(dashboardRefreshInterval);
  });
</script>
{% endblock %}
