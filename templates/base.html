<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QRTrack{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />

  {% block head %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2 fw-700" href="/">
      <div class="brand-icon">
        <i class="bi bi-qr-code-scan"></i>
      </div>
      <span>QR<span class="text-accent">Track</span></span>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link px-3 {% if request.endpoint == 'index' %}active{% endif %}" href="/">
            <i class="bi bi-plus-square me-1"></i>สร้าง QR Code
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-grid-3x3-gap me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <div class="nav-divider"></div>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle px-3 d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>{{ current_user.username }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="/logout"><i class="bi bi-door-open me-2"></i>ออกจากระบบ</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer py-4">
  <div class="container text-center">
    <p class="mb-0 text-muted small">
      <i class="bi bi-qr-code me-1"></i>
      QRTrack &mdash; สร้าง QR Code พร้อมระบบติดตามการสแกน
    </p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
